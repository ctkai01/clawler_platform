# Default consumer_timeout (1,800,000ms / 30 min) is too tight for this
# workload: a single profile crawl can legitimately take up to ~25 min
# (900s scroll cap + sequential per-post comment fetching), and queueing
# delay in Celery's own prefetch buffer on top of that pushes some
# deliveries past 30 min even when no individual task is actually stuck —
# real incident, repeated worker crash-loop on both hub and the remote
# worker (tommy) despite app-level time budgeting. Raised well past any
# realistic single-task duration rather than tuned tight, since the cost of
# a message sitting unacked a bit longer is nothing compared to killing the
# whole worker process.
consumer_timeout = 10800000
