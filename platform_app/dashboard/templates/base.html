<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Crawl Platform{% endblock %}</title>
    <style>
        :root {
            --bg: #f4f5f7;
            --surface: #ffffff;
            --border: #e5e7eb;
            --text: #1f2328;
            --muted: #6b7280;
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --shadow: 0 1px 2px rgba(16, 24, 40, 0.04), 0 1px 3px rgba(16, 24, 40, 0.06);
            --shadow-hover: 0 4px 12px rgba(16, 24, 40, 0.08), 0 2px 4px rgba(16, 24, 40, 0.06);
        }
        * { box-sizing: border-box; }
        body {
            font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            line-height: 1.55;
        }
        a { color: var(--primary); text-decoration: none; }
        a:hover { color: var(--primary-dark); text-decoration: underline; }

        .topbar {
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: white;
            padding: 1rem 2rem;
            box-shadow: var(--shadow);
        }
        .topbar a { color: white; text-decoration: none; }
        .topbar h1 { font-size: 1.15rem; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
        .topbar .subtitle { font-size: 0.8rem; opacity: 0.85; margin-top: 0.15rem; }

        main { max-width: 820px; margin: 0 auto; padding: 1.75rem 1.25rem 4rem; }

        .flash {
            border-radius: 8px; padding: 0.7rem 1rem; margin-bottom: 1rem; font-size: 0.9rem;
        }
        .flash-ok { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .flash-error { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }

        .trigger-box {
            display: flex; align-items: center; gap: 0.6rem;
            background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
            padding: 0.75rem 1rem; margin-bottom: 1.25rem; box-shadow: var(--shadow);
        }
        .trigger-box label { font-size: 0.85rem; color: var(--muted); font-weight: 500; }
        .trigger-box select {
            flex: 1 1 auto; padding: 0.4rem 0.6rem; border-radius: 6px; border: 1px solid var(--border);
            font-size: 0.85rem; background: white; color: var(--text);
        }
        .trigger-box button {
            background: var(--primary); color: white; border: none; border-radius: 6px;
            padding: 0.45rem 1rem; font-size: 0.85rem; font-weight: 600; cursor: pointer;
            transition: background 0.15s ease;
        }
        .trigger-box button:hover { background: var(--primary-dark); }

        .filters {
            display: flex; flex-wrap: wrap; gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .filters a {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 999px; padding: 0.35rem 0.9rem; font-size: 0.85rem;
            color: var(--text); transition: all 0.15s ease;
        }
        .filters a:hover { border-color: var(--primary); text-decoration: none; }
        .filters a.active { background: var(--primary); border-color: var(--primary); color: white; font-weight: 500; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem 1.4rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
            transition: box-shadow 0.15s ease, transform 0.15s ease;
        }
        .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }

        .meta { color: var(--muted); font-size: 0.8rem; margin-bottom: 0.6rem; display: flex; align-items: center; flex-wrap: wrap; gap: 0.35rem; }

        .badge {
            display: inline-block; border-radius: 6px; padding: 0.15rem 0.55rem;
            font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em;
        }
        .badge-facebook_group, .badge-facebook_page { background: #e0edff; color: #1d4ed8; }
        .badge-forum { background: #fef3c7; color: #b45309; }
        .badge-news { background: #dcfce7; color: #15803d; }
        .badge-source { background: #f1f5f9; color: #475569; text-transform: none; font-weight: 500; }
        .badge-category { background: #ede9fe; color: #6d28d9; }
        .badge-sentiment-positive { background: #dcfce7; color: #15803d; }
        .badge-sentiment-negative { background: #fee2e2; color: #b91c1c; }
        .badge-sentiment-neutral { background: #f1f5f9; color: #475569; }
        .badge-severity { background: #fef3c7; color: #b45309; }
        .badge-entity { background: #e0f2fe; color: #0369a1; text-transform: none; font-weight: 500; }
        .badge-sentsrc-ai { background: #ede9fe; color: #7c3aed; text-transform: none; font-weight: 500; }
        .badge-sentsrc-default { background: #f1f5f9; color: #64748b; text-transform: none; font-weight: 500; }

        .topic { font-size: 1.02rem; font-weight: 650; margin: 0 0 0.35rem; color: #111827; }
        .content { color: #374151; white-space: pre-wrap; margin: 0.35rem 0 0.85rem; }

        .media { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.5rem 0 0.85rem; }
        .media img {
            max-width: 220px; max-height: 220px; border-radius: 8px; border: 1px solid var(--border);
            object-fit: cover;
        }
        .media-links { margin: 0.25rem 0 0.85rem; font-size: 0.85rem; }
        .media-links a { margin-right: 0.75rem; }

        .stats {
            display: flex; flex-wrap: wrap; align-items: center; gap: 0.9rem;
            font-size: 0.85rem; color: var(--muted);
            border-top: 1px solid var(--border); padding-top: 0.75rem; margin-top: 0.25rem;
        }
        .stats .stat { display: inline-flex; align-items: center; gap: 0.3rem; }
        .stats .spacer { flex: 1 1 auto; }
        .stats a { font-weight: 500; }

        .pagination {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 2rem; font-size: 0.9rem; color: var(--muted);
        }
        .pagination a {
            background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
            padding: 0.45rem 1rem; color: var(--text);
        }
        .pagination a:hover { border-color: var(--primary); text-decoration: none; color: var(--primary); }

        .back-link { display: inline-block; margin-bottom: 1rem; font-size: 0.9rem; }

        .comment-list { margin-top: 0.75rem; }
        .comment { display: flex; gap: 0.7rem; padding: 0.75rem 0; border-bottom: 1px solid var(--border); }
        .comment:last-child { border-bottom: none; }
        .avatar {
            flex: 0 0 auto; width: 2rem; height: 2rem; border-radius: 50%;
            background: var(--primary); color: white; display: flex; align-items: center;
            justify-content: center; font-weight: 600; font-size: 0.85rem;
        }
        .comment .meta { margin-bottom: 0.15rem; }
        .comment-body { flex: 1 1 auto; }

        .empty-state { text-align: center; color: var(--muted); padding: 3rem 1rem; }
        h3 { font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin: 2rem 0 0.75rem; }

        .report-kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
        .report-kpi { background: var(--bg); border-radius: 10px; padding: 0.85rem 1rem; text-align: center; }
        .report-kpi-label { font-size: 0.78rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.02em; }
        .report-kpi-value { font-size: 1.5rem; font-weight: 700; color: var(--primary-dark); margin-top: 0.2rem; }
        .report-chart-box { max-width: 420px; margin: 0.5rem auto 0; }
        .report-chart-tall { max-width: 100%; }
        .report-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
        .report-table th, .report-table td { text-align: left; padding: 0.5rem 0.6rem; border-bottom: 1px solid var(--border); }
        .report-table th { color: var(--muted); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.02em; }
    </style>
</head>
<body>
<div class="topbar">
    <a href="/">
        <h1>📡 Crawl Platform</h1>
        <div class="subtitle">Facebook · Forum · News</div>
    </a>
    <a href="/report" style="float:right; font-size:0.85rem; opacity:0.9;">📊 Report</a>
</div>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
