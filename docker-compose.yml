x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
    target: http-worker
  env_file:
    - .env
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${POSTGRES_PASSWORD:-airflow}@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:${POSTGRES_PASSWORD:-airflow}@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    CRAWL_PLATFORM_DSN: postgresql://crawler:${APP_DB_PASSWORD:-crawler}@postgres/crawl_platform
    FB_SESSION_PATH: /opt/app/secrets/fb_session.json
    FB_SESSION_DIR: /opt/app/secrets/fb_sessions
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - ./secrets:/opt/app/secrets:ro
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: airflow
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-crawler}
    ports:
      # Bound to loopback only — host tools (pytest, psql) still reach it via
      # localhost, but it's never reachable from outside this machine. Do NOT
      # widen this to "5432:5432" on a host with a public IP.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine

  # Production-only static build of the customer portal. Local dev doesn't
  # use this service — keep running `npm run dev` in frontend/ instead
  # (hot-reloads, and avoids a port-5173 clash with this container). A bare
  # `docker compose up` with no service names WILL try to start this one
  # too; on a dev machine, bring up services by name instead
  # (`docker compose up -d api postgres ...`) or `docker compose stop frontend`
  # if it collides with a running `npm run dev`.
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8083}
    ports:
      - "5173:80"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: http-worker
    environment:
      CRAWL_PLATFORM_DSN: postgresql://crawler:${APP_DB_PASSWORD:-crawler}@postgres/crawl_platform
      AIRFLOW_API_BASE: http://airflow-webserver:8080
      AIRFLOW_API_USER: admin
      AIRFLOW_API_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    ports:
      - "8082:8000"
    command: uvicorn platform_app.dashboard.app:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: http-worker
    env_file:
      - .env
    environment:
      CRAWL_PLATFORM_DSN: postgresql://crawler:${APP_DB_PASSWORD:-crawler}@postgres/crawl_platform
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:5173}
      AIRFLOW_API_BASE: http://airflow-webserver:8080
      AIRFLOW_API_USER: admin
      AIRFLOW_API_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    ports:
      - "8083:8000"
    command: uvicorn platform_app.api.app:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" --firstname Admin --lastname Admin --role Admin --email admin@example.com || true
        airflow pools set fb_group_pool 2 "FB Group crawl sessions — kept low, all groups share one account (membership-gated)"
        airflow pools set fb_page_pool 5 "FB Page crawl sessions — spread across the FB session pool (multiple accounts)"
        airflow pools set http_pool 30 "Concurrent lightweight HTTP crawls (forum/news)"
        python -m platform_app.db.migrate

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8081:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-worker-http:
    <<: *airflow-common
    command: airflow celery worker --queues http_crawler --concurrency 20
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-worker-fb:
    build:
      context: .
      dockerfile: Dockerfile
      target: fb-worker
    environment: *airflow-common-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - ./secrets:/opt/app/secrets:ro
    command: airflow celery worker --queues fb_crawler --concurrency 7
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres-data:
  airflow-logs:
