x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
    target: http-worker
  env_file:
    - .env
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    CRAWL_PLATFORM_DSN: postgresql://crawler:crawler@postgres/crawl_platform
    FB_SESSION_PATH: /opt/app/secrets/fb_session.json
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - ./secrets:/opt/app/secrets:ro
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"  # dev convenience: lets host tools (pytest, psql) reach crawl_platform directly
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: http-worker
    environment:
      CRAWL_PLATFORM_DSN: postgresql://crawler:crawler@postgres/crawl_platform
      AIRFLOW_API_BASE: http://airflow-webserver:8080
      AIRFLOW_API_USER: admin
      AIRFLOW_API_PASSWORD: admin
    ports:
      - "8082:8000"
    command: uvicorn platform_app.dashboard.app:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: http-worker
    env_file:
      - .env
    environment:
      CRAWL_PLATFORM_DSN: postgresql://crawler:crawler@postgres/crawl_platform
      API_CORS_ORIGINS: http://localhost:5173
    ports:
      - "8083:8000"
    command: uvicorn platform_app.api.app:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@example.com || true
        airflow pools set fb_playwright_pool 3 "Concurrent Playwright/Chromium sessions for FB crawling"
        airflow pools set http_pool 30 "Concurrent lightweight HTTP crawls (forum/news)"
        python -m platform_app.db.migrate

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8081:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-worker-http:
    <<: *airflow-common
    command: airflow celery worker --queues http_crawler --concurrency 20
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-worker-fb:
    build:
      context: .
      dockerfile: Dockerfile
      target: fb-worker
    environment: *airflow-common-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - ./secrets:/opt/app/secrets:ro
    command: airflow celery worker --queues fb_crawler --concurrency 3
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres-data:
  airflow-logs:
