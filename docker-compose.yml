x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
    target: http-worker
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${POSTGRES_PASSWORD:-airflow}@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:${POSTGRES_PASSWORD:-airflow}@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    CRAWL_PLATFORM_DSN: postgresql://crawler:${APP_DB_PASSWORD:-crawler}@postgres/crawl_platform
    FB_SESSION_PATH: /opt/app/secrets/fb_session.json
    FB_SESSION_DIR: /opt/app/secrets/fb_sessions
    # Producer-side only for airflow-worker-http (dispatch_due_sources()
    # publishes crawl_batch_task here) — the actual browsing happens on
    # fb-celery-worker, which consumes this same queue.
    FB_BROKER_URL: amqp://fbcrawl:fbcrawl@rabbitmq:5672//
    FB_INFLIGHT_REDIS_URL: redis://redis:6379/2
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - ./secrets:/opt/app/secrets:ro
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started
    rabbitmq:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: airflow
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-crawler}
    ports:
      # Always bound to loopback — host tools (pytest, psql, DBeaver) reach
      # it via localhost regardless of LAN_BIND_IP below. Kept as its own
      # fixed entry rather than folded into the LAN_BIND_IP line: Docker
      # rejects two identical host_ip:host_port bindings for one container,
      # so if LAN_BIND_IP defaulted to 127.0.0.1 too, `docker compose up`
      # with it unset would fail outright instead of silently doing nothing.
      - "127.0.0.1:5432:5432"
      # Additionally bound to this host's Tailscale IP (100.x.x.x) only when
      # LAN_BIND_IP is set, so a remote fb-celery-worker (docker-compose.worker.yml,
      # see docs/fb-worker-remote.md) can reach it over the tailnet — NEVER
      # set LAN_BIND_IP to "0.0.0.0" or a public IP, on a dev machine or a
      # VPS alike. Default 127.0.0.2 when unset is a harmless no-op (still
      # loopback-only, just a second address) purely so this line is always
      # valid to Docker without colliding with the fixed entry above.
      - "${LAN_BIND_IP:-127.0.0.2}:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      # No host binding needed for the single-machine setup (only reached via
      # the docker network) — only exposed when LAN_BIND_IP is set, same
      # remote-worker use case as postgres above (127.0.0.2 default is the
      # same harmless-no-op trick, see the comment there). Host-side port
      # 16379 (not the default 6379) — this host already has an unrelated
      # project's Redis bound system-wide on 6379; internal
      # container-to-container traffic (redis://redis:6379/...) is
      # unaffected, only the exposed host port differs.
      - "${LAN_BIND_IP:-127.0.0.2}:16379:6379"

  # Production-only static build of the customer portal. Local dev doesn't
  # use this service — keep running `npm run dev` in frontend/ instead
  # (hot-reloads, and avoids a port-5173 clash with this container). A bare
  # `docker compose up` with no service names WILL try to start this one
  # too; on a dev machine, bring up services by name instead
  # (`docker compose up -d api postgres ...`) or `docker compose stop frontend`
  # if it collides with a running `npm run dev`.
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8083}
    ports:
      - "5173:80"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: http-worker
    environment:
      CRAWL_PLATFORM_DSN: postgresql://crawler:${APP_DB_PASSWORD:-crawler}@postgres/crawl_platform
      AIRFLOW_API_BASE: http://airflow-webserver:8080
      AIRFLOW_API_USER: admin
      AIRFLOW_API_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      # Chỉ dùng để ping fb-celery-worker (control.ping) trên trang /fb-crawl
      # — dashboard không publish task nào, chỉ đọc trạng thái.
      FB_BROKER_URL: amqp://fbcrawl:fbcrawl@rabbitmq:5672//
    ports:
      - "8082:8000"
    command: uvicorn platform_app.dashboard.app:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: http-worker
    env_file:
      - .env
    environment:
      CRAWL_PLATFORM_DSN: postgresql://crawler:${APP_DB_PASSWORD:-crawler}@postgres/crawl_platform
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:5173}
      AIRFLOW_API_BASE: http://airflow-webserver:8080
      AIRFLOW_API_USER: admin
      AIRFLOW_API_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    ports:
      - "8083:8000"
    command: uvicorn platform_app.api.app:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" --firstname Admin --lastname Admin --role Admin --email admin@example.com || true
        airflow pools set http_pool 30 "Concurrent lightweight HTTP crawls (forum/news)"
        python -m platform_app.db.migrate

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8081:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-worker-http:
    <<: *airflow-common
    command: airflow celery worker --queues http_crawler --concurrency 20
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # RabbitMQ + fb-celery-worker replace what used to be airflow-worker-fb —
  # Airflow no longer runs Playwright at all (facebook_groups_crawl /
  # facebook_pages_crawl now just dispatch batches here, on the lightweight
  # http_crawler queue). See docs/dag-flow.md.
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: fbcrawl
      RABBITMQ_DEFAULT_PASS: fbcrawl
    ports:
      # Management UI — kept loopback-only always (not needed by a remote
      # worker). Not 15672/5672 defaults, and not 15673 either: the
      # fb-distributed-scraper reference project already runs its own
      # RabbitMQ on this host bound to that port.
      - "127.0.0.1:15674:15672"
      # AMQP — only exposed beyond loopback when LAN_BIND_IP is set, same
      # remote fb-celery-worker use case as postgres/redis above.
      - "${LAN_BIND_IP:-127.0.0.1}:5672:5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  fb-celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: fb-worker
    env_file:
      - .env
    environment:
      CRAWL_PLATFORM_DSN: postgresql://crawler:${APP_DB_PASSWORD:-crawler}@postgres/crawl_platform
      FB_BROKER_URL: amqp://fbcrawl:fbcrawl@rabbitmq:5672//
      FB_INFLIGHT_REDIS_URL: redis://redis:6379/2
    command: celery -A platform_app.crawlers.celery_app worker --queues fb_crawl --concurrency ${FB_CELERY_CONCURRENCY:-4}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy

volumes:
  postgres-data:
  airflow-logs:
